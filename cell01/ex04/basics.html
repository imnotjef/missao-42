<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics</title>
    <style>
        body {
            background-color: #fcafbc;
        }

        h1 {
            text-align: center;
            color: white;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-top: 100px;
        }
        .item img {
            width: 500px;
            height: 500px;
            object-fit: cover;
        }
        .copyright {
            text-align: right;
            font-style: italic;
            font-family: monospace;
        }
    </style>

</head>
<body>

  <h1>Apple 🍎</h1>
<div class="container">
    <div class="item">
        <img src="imagem/imagem1.jpg" alt="MacBook Neo">
        <a href="https://www.apple.com/br/shop/buy-mac/macbook-neo">Ver produto</a>
    </div>

    <div class="item">
        <img src="imagem/imagem2.jpg" alt="MacBook Air prateado">
        <a href="https://www.apple.com/br/shop/buy-mac/macbook-pro/14-polegadas-m5">Ver produto</a>
    </div>
</div>
 
<hr>

<p class="copyright">© jefrodri 2026</p>

</body>
</html>
