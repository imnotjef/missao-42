<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <style>
        body {
            margin: 0;
        }

        table {
            width: 100%;
            height: 100vh;
            border-collapse: collapse;
        }

        .celula1 {
            background-color: rgb(20, 50, 221);
            width: 50%;
        }

        .celula2 {
            background-color: rgb(233, 11, 11);
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="celula1">Azul</td>
            <td class="celula2">Vermelho</td>
        </tr>
    </table>

</body>
</html>
